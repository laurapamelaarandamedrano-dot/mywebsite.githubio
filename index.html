<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Balance | No Cap We On Top</title>
    <style>
        :root {
            --pink-neon: #FF007F;
            --cyan-digital: #00FFFF;
            --gold: #FFD700;
            --green-eco: #2ECC71;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Helvetica Neue', sans-serif;
            overflow-x: hidden; text-align: center;
            scroll-behavior: smooth;
        }

        /* --- FONDO DINÁMICO: EL UNIVERSO Y EL GLOBO --- */
        #universe-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
        }

        /* Estrellas de fondo */
        #stars {
            position: absolute; width: 200%; height: 200%;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveStars 150s linear infinite;
            opacity: 0.3;
        }

        /* EL GLOBO TERRÁQUEO GIRATORIO */
        .globe {
            position: absolute;
            top: 50%; left: 50%;
            width: 60vmax; height: 60vmax;
            margin-left: -30vmax; margin-top: -30vmax;
            border-radius: 50%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(0, 255, 255, 0.1), transparent),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), /* Textura sutil */
                linear-gradient(90deg, #001 0%, #003 50%, #001 100%);
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.8), 
                        inset 20px 20px 50px rgba(0, 255, 255, 0.1),
                        0 0 40px rgba(0, 255, 255, 0.05);
            animation: rotateGlobe 40s linear infinite;
            opacity: 0.5;
            z-index: -1;
        }

        /* Estrellas Fugaces */
        .shooting {
            position: absolute; top: 0; left: 50%; width: 2px; height: 80px;
            background: linear-gradient(to bottom, var(--pink-neon), transparent);
            animation: shoot 4s linear infinite; opacity: 0;
        }

        @keyframes rotateGlobe { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes moveStars { from { transform: translate(-25%, -25%); } to { transform: translate(0, 0); } }
        @keyframes shoot {
            0% { transform: translateY(-100px) translateX(0) rotate(45deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(-500px) rotate(45deg); opacity: 0; }
        }

        /* --- CONTENIDO (SECCIONES RETENIDAS) --- */
        .hero { padding: 120px 20px 60px; min-height: 40vh; display: flex; flex-direction: column; justify-content: center; }
        .cosmic-brand { color: var(--gold); font-weight: bold; letter-spacing: 10px; font-size: 1.5rem; text-shadow: 0 0 15px var(--gold); }
        
        section { padding: 60px 20px; max-width: 1100px; margin: 0 auto; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        .card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 25px; backdrop-filter: blur(15px);
            transition: 0.3s; text-align: left;
        }
        .card:hover { border-color: var(--pink-neon); transform: translateY(-5px); }

        .balance-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress { height: 100%; background: linear-gradient(90deg, var(--pink-neon), var(--cyan-digital)); width: 88%; }

        /* GLITTER */
        .glitter { position: absolute; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; animation: spark 1s forwards; z-index: 1000; }
        @keyframes spark { to { opacity: 0; transform: translateY(40px) scale(0); } }
    </style>
</head>
<body>
    <div id="universe-container">
        <div id="stars"></div>
        <div class="globe"></div>
        <div class="shooting" style="left: 80%; animation-delay: 1s;"></div>
        <div class="shooting" style="left: 20%; animation-delay: 3s;"></div>
    </div>

    <div class="hero">
        <div class="cosmic-brand">COSMIC CAPITAL</div>
        <p style="letter-spacing: 6px; color: var(--pink-neon); margin-top: 15px; font-weight: bold;">NO CAP WE ON TOP</p>
    </div>

    <section>
        <div class="card" style="text-align: center; border: 1px solid var(--cyan-digital);">
            <h3 style="color: var(--cyan-digital); margin: 0;">Energy & Focus Monitor</h3>
            <div class="balance-bar"><div class="progress"></div></div>
        </div>
    </section>

    <section>
        <div class="grid">
            <div class="card"><h3 style="color: var(--gold)">Aesthetic Intelligence</h3><p>Style & Hair rituals.</p></div>
            <div class="card"><h3 style="color: white">The Archive</h3><p>Geopolitical papers.</p></div>
            <div class="card"><h3 style="color: var(--green-eco)">Eco-Strategy</h3><p>Environmental analysis.</p></div>
            <div class="card"><h3 style="color: var(--cyan-digital)">Cosmic Paws</h3><p>Pet care tips.</p></div>
            <div class="card"><h3 style="color: #ff1801">Pit Stop</h3><p>F1 & Odd Sports.</p></div>
        </div>
    </section>

    <script>
        document.addEventListener('mousemove', (e) => {
            const spark = document.createElement('div');
            spark.className = 'glitter';
            spark.style.left = e.pageX + 'px';
            spark.style.top = e.pageY + 'px';
            const colors = ['#FF007F', '#00FFFF', '#FFD700', '#2ECC71'];
            spark.style.background = colors[Math.floor(Math.random()*colors.length)];
            document.body.appendChild(spark);
            setTimeout(() => spark.remove(), 1000);
        });
    </script>
</body>
</html>
