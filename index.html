<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura Pamela Aranda Medrano | Cosmic Capital</title>
    <style>
        /* --- CORE CÓSMICO (ADN DEL DISEÑO) --- */
        :root {
            --bg-deep: #000000; /* Negro absoluto */
            --pink-futuristic: #FF007F; /* Rosa Neón Intenso */
            --cyan-digital: #00FFFF; /* Revolución Digital */
            --gold-cosmic: #FFD700; /* Capitalismo */
            --white-core: #FFFFFF;
            --glow-pink: 0 0 30px rgba(255, 0, 127, 0.8);
            --glow-gold: 0 0 30px rgba(255, 215, 0, 0.8);
            --transition-smooth: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--white-core);
            font-family: 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            perspective: 1000px; /* Para efectos 3D en la página */
        }

        /* --- FONDO DE ESTRELLAS ANIMADO (MUCHO MOVIMIENTO) --- */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.3) 1px, transparent 2px),
                radial-gradient(white, rgba(255,255,255,.2) 1.5px, transparent 2.5px),
                radial-gradient(var(--pink-futuristic), rgba(255, 0, 127, .1) 2px, transparent 3px);
            background-size: 400px 400px, 300px 300px, 200px 200px;
            background-position: 0 0, 20px 30px, 50px 70px;
            animation: starScroll 120s linear infinite; /* Gira más rápido */
        }

        @keyframes starScroll {
            from { background-position: 0 0, 20px 30px, 50px 70px; }
            to { background-position: -2000px -2000px, -1980px -1970px, -1950px -1930px; }
        }

        /* --- SISTEMA DE GLITTER INTERACTIVO (CSS) --- */
        .glitter {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.9;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            animation: glitterFade 1.2s ease-out forwards;
            z-index: 9999;
        }

        @keyframes glitterFade {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: translateY(60px) scale(0); opacity: 0; }
        }

        /* --- PORTADA DEFINITIVA (MAQUETACIÓN) --- */
        #home {
            position: relative;
            padding: 40px;
            max-width: 90vw;
            /* MUCHO MOVIMIENTO EN TODA LA PAGINA (EFECTO FLOTANTE) */
            animation: floatPage 10s ease-in-out infinite alternate;
        }

        @keyframes floatPage {
            0% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-10px) rotateX(2deg); }
            100% { transform: translateY(10px) rotateX(-2deg); }
        }

        /* TÍTULO INICIAL: COSMIC CAPITAL (MÁXIMO BRILLO) */
        .cosmic-capital {
            font-size: 1.2rem;
            color: var(--gold-cosmic);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
            font-weight: bold;
            display: inline-block;
            filter: drop-shadow(var(--glow-gold));
            animation: shineGold 3s linear infinite, glowPulseGold 1s ease-in-out infinite alternate;
        }

        @keyframes shineGold {
            0% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4)); }
            100% { filter: drop-shadow(0 0 35px rgba(255, 215, 0, 1)); }
        }

        @keyframes glowPulseGold {
            from { text-shadow: 0 0 5px rgba(255, 215, 0, 0.4); }
            to { text-shadow: 0 0 15px rgba(255, 215, 0, 1); }
        }

        /* TU NOMBRE: UNA SOLA LÍNEA | ROSA FUTURISTA (MUCHO RESPLANDOR) */
        h1 {
            font-size: 3.5rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0;
            color: var(--pink-futuristic);
            filter: drop-shadow(var(--glow-pink));
            animation: glowPulsePink 3s ease-in-out infinite alternate;
            /* Requisito 1: Una sola línea (No se divide nunca) */
            white-space: nowrap; 
        }

        @keyframes glowPulsePink {
            from { filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.6)); }
            to { filter: drop-shadow(0 0 35px rgba(255, 0, 127, 1)); }
        }

        .title-sub {
            font-size: 1.1rem;
            color: #CCCCCC;
            letter-spacing: 4px;
            margin-top: 10px;
            font-weight: 300;
        }

        .manifesto-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--cyan-digital);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-top: 2rem;
            animation: heartbeat 2s infinite alternate;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* Media queries para que se vea bien en celulares largos */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 6px;
            }
        }

    </style>
</head>
<body>

    <div id="starfield"></div>

    <section id="home">
        <div class="cosmic-capital">Cosmic Capital</div>
        
        <h1>Laura Pamela Aranda Medrano</h1>
        
        <p class="title-sub">The New Standard in Academia</p>
        
        <p style="max-width: 600px; line-height: 1.8; color: #ccc; font-size: 1.1rem; font-weight: 300; margin-top: 30px;">
             Rewriting the world in a global, pop-infused, and transformative key. Intellectual excellence blends with the strategic vision of a generation that refuses to settle.
        </p>
        
        <div class="manifesto-tag">Rewriting Geopolitics</div>
    </section>

    <script>
        document.addEventListener('mousemove', (e) => {
            // Creamos la partícula de glitter
            const spark = document.createElement('div');
            spark.className = 'glitter';
            
            // Posición basada en el mouse
            spark.style.left = e.pageX + 'px';
            spark.style.top = e.pageY + 'px';
            
            // Colores aleatorios de tu marca (Rosa, Cyan, Oro)
            const colors = ['#FF007F', '#FFFFFF', '#00FFFF', '#FFD700'];
            spark.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            // Tamaño aleatorio para naturalidad
            const size = Math.random() * 8 + 2 + 'px'; // Hasta 10px
            spark.style.width = size;
            spark.style.height = size;

            document.body.appendChild(spark);
            
            // Borramos la partícula después de la animación
            setTimeout(() => {
                spark.remove();
            }, 1200); // 1.2 segundos
        });
    </script>
</body>
</html>
